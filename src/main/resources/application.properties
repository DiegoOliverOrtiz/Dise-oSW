spring.application.name=esientradas

#BASE DE DATOS (ACCESO SI USAMOS SPRING)
#spring.datasource.url = jdbc:mysql://172.20.48.23:3306/gramola?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.url = jdbc:mysql://localhost:3306/esientradas?serverTimezone=UTC&autoReconnect=true&useSSL=false&allowPublicKeyRetrieval=true&maxAllowedPacket=134217728
spring.datasource.username = root
spring.datasource.password = 0804

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
#spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = update

server.error.include-message=always

logging.level.org.hibernate.SQsL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

stripe.public-key=${STRIPE_PUBLIC_KEY:}
stripe.secret-key=${STRIPE_SECRET_KEY:}
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:4200}

# Email delivery queue configuration (outbox + retry)
email.external-url=${EMAIL_EXTERNAL_URL:http://localhost:8081/external/sendTicket}
email.retry.ms=${EMAIL_RETRY_MS:60000}
email.max-attempts=${EMAIL_MAX_ATTEMPTS:5}
