spring.application.name=esientradas

server.port=8080

spring.datasource.url=jdbc:h2:file:./data/esientradas-dev;MODE=MySQL;DATABASE_TO_UPPER=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.error.include-message=never
server.error.include-stacktrace=never
spring.jpa.open-in-view=false

logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

stripe.public-key=${STRIPE_PUBLIC_KEY:}
stripe.secret-key=${STRIPE_SECRET_KEY:}
app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:4200}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
app.esiusuarios.url=${ESIUSUARIOS_URL:http://localhost:8081}
app.internal.api.secret=${INTERNAL_API_SECRET:}
app.security.headers.content-security-policy=${CONTENT_SECURITY_POLICY:default-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'}
app.security.headers.referrer-policy=${REFERRER_POLICY:no-referrer}
app.security.headers.hsts=${HSTS_HEADER:max-age=31536000; includeSubDomains}
app.rate-limit.cleanup-delay-ms=${RATE_LIMIT_CLEANUP_DELAY_MS:300000}
app.rate-limit.public.max-requests=${PUBLIC_RATE_LIMIT_MAX_REQUESTS:120}
app.rate-limit.public.window-seconds=${PUBLIC_RATE_LIMIT_WINDOW_SECONDS:60}
